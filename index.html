<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gourab Multi-Checker V4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --gold: #ffcc00; --bg: #030712; --card: #111827; --green: #10b981; --red: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .navbar { background: var(--card); padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .sidebar { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: #000; transition: 0.5s; z-index: 2000; border-left: 1px solid var(--gold); }
        .sidebar.active { right: 0; }
        .close-btn { font-size: 35px; color: var(--gold); cursor: pointer; padding: 15px; display: block; text-align: right; }
        .menu-item { padding: 15px 25px; display: block; color: #ccc; text-decoration: none; border-bottom: 1px solid #222; cursor: pointer; }
        .menu-item:hover { background: var(--gold); color: #000; }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .box { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #333; margin-top: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        textarea { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; font-family: monospace; }
        .btn-main { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .copy-btn { flex: 1; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; color: #fff; }
        #appUI, #menuTrigger { display: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="color: var(--gold); font-size: 22px; font-weight: bold;">GOURAB CHECKER</div>
        <div id="menuTrigger" onclick="toggleMenu()" style="font-size: 30px; cursor: pointer;">☰</div>
    </div>

    <div id="sidebar" class="sidebar">
        <span class="close-btn" onclick="toggleMenu()">×</span>
        <a class="menu-item" onclick="loadTool('gmail')">📧 Gmail (Emailscan Style)</a>
        <a class="menu-item" onclick="loadTool('ip')">🌐 IP (Whoer Style)</a>
        <a class="menu-item" onclick="loadTool('fb')">🔵 Facebook (Dongvan Style)</a>
        <a class="menu-item" onclick="loadTool('tg')">✈️ Telegram Number</a>
        <a class="menu-item" id="adminLink" onclick="loadAdmin()" style="display:none; color: cyan;">👑 Admin Access</a>
        <a class="menu-item" onclick="logout()" style="color: var(--red);">🚪 Logout</a>
    </div>

    <div class="container">
        <div id="authUI" class="box">
            <h2 id="authTitle" style="text-align:center; color: var(--gold);">SECURE ACCESS</h2>
            <div id="loginForm">
                <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; background:#000; color:white; border:1px solid #444;">
                <input type="password" id="pass" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; background:#000; color:white; border:1px solid #444;">
                <button class="btn-main" onclick="handleAuth('login')">LOGIN</button>
                <p style="text-align:center;" onclick="switchAuth(false)">No account? <span style="color:var(--gold);">Register</span></p>
            </div>
            <div id="regForm" style="display:none;">
                <input type="text" id="rName" placeholder="Full Name" style="width:100%; padding:12px; margin:5px 0; background:#000; color:white; border:1px solid #444;">
                <input type="email" id="rEmail" placeholder="Email" style="width:100%; padding:12px; margin:5px 0; background:#000; color:white; border:1px solid #444;">
                <input type="password" id="rPass" placeholder="Password" style="width:100%; padding:12px; margin:5px 0; background:#000; color:white; border:1px solid #444;">
                <button class="btn-main" onclick="handleAuth('reg')">CREATE REQUEST</button>
                <p style="text-align:center;" onclick="switchAuth(true)">Back to Login</p>
            </div>
        </div>

        <div id="appUI">
            <div id="checkerBox" class="box">
                <h3 id="toolTitle" style="color: var(--gold);">SELECT A TOOL</h3>
                <div id="toolContent"></div>
                <div id="results" style="margin-top: 15px; border: 1px solid #333; padding: 10px; max-height: 250px; overflow-y: auto;"></div>
                <div id="copyPanel" class="btn-group" style="display:none;">
                    <button class="copy-btn" style="background:var(--green);" onclick="copy('good')">Copy Good</button>
                    <button class="copy-btn" style="background:var(--red);" onclick="copy('bad')">Copy Bad</button>
                    <button class="copy-btn" style="background:#06b6d4;" onclick="copy('verify')">Copy Verified</button>
                    <button class="copy-btn" style="background:#8b5cf6;" onclick="copy('notexist')">Not Exist</button>
                </div>
            </div>
            <div id="adminPanel" class="box" style="display:none;"></div>
        </div>
    </div>

    <script>
        let goodArr = [], badArr = [], verifyArr = [], existArr = [];
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function switchAuth(isLogin) {
            document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
            document.getElementById('regForm').style.display = isLogin ? 'none' : 'block';
            document.getElementById('authTitle').innerText = isLogin ? "SECURE ACCESS" : "CREATE ACCOUNT";
        }

        async function handleAuth(type) {
            const endpoint = type === 'login' ? '/api/login' : '/api/register';
            const data = type === 'login' ? 
                { email: document.getElementById('email').value, password: document.getElementById('pass').value } :
                { name: document.getElementById('rName').value, email: document.getElementById('rEmail').value, password: document.getElementById('rPass').value };
            
            const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)});
            const result = await res.json();
            if(result.success) {
                if(type === 'reg') { alert("Request Sent! Wait for Admin."); location.reload(); }
                else { localStorage.setItem('role', result.role); location.reload(); }
            } else { alert(result.message); }
        }

        window.onload = () => {
            const role = localStorage.getItem('role');
            if(role) {

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GOURAB CHECKER v1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --gold: #ffcc00; --bg: #030712; --card: #111827; --green: #10b981; --red: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        .navbar { background: var(--card); padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .sidebar { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: #000; transition: 0.5s; z-index: 2000; border-left: 1px solid var(--gold); }
        .sidebar.active { right: 0; }
        .close-btn { font-size: 35px; color: var(--gold); cursor: pointer; padding: 15px; display: block; text-align: right; }
        .menu-item { padding: 15px 25px; display: block; color: #ccc; text-decoration: none; border-bottom: 1px solid #222; cursor: pointer; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .box { background: var(--card); padding: 25px; border-radius: 12px; margin-top: 20px; border: 1px solid #333; }
        textarea { width: 100%; padding: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; }
        .btn-main { width: 100%; padding: 14px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .res-line { padding: 8px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .copy-btn { padding: 5px 10px; background: #333; color: var(--gold); border: 1px solid var(--gold); border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="color: var(--gold); font-size: 20px; font-weight: bold;">GOURAB CHECKER v1</div>
        <div id="menuBtn" onclick="toggleMenu()" style="font-size: 25px; cursor: pointer; display: none;">☰</div>
    </div>

    <div id="sidebar" class="sidebar">
        <span class="close-btn" onclick="toggleMenu()">×</span>
        <a class="menu-item" onclick="loadTool('gmail')">📧 Gmail Slit</a>
        <a class="menu-item" onclick="loadTool('ip')">🌐 Ip Slit</a>
        <a class="menu-item" onclick="loadTool('fb')">🔵 Facebook Slit</a>
        <a class="menu-item" onclick="loadTool('tg')">✈️ Tg Slit</a>
        <a class="menu-item" onclick="logout()" style="color: var(--red);">🚪 Logout</a>
    </div>

    <div class="container">
        <div id="welcomeUI" class="box" style="display:none; text-align:center;">
            <h2 style="color: var(--gold);">স্বাগতম!</h2>
            <p>গৌরব ভাইয়ের এই সাইটে আপনাকে স্বাগতম। এই সাইটে আপনি আপনার প্রয়োজনের সবকিছু পেয়ে যাবেন। ভদ্রতার সাথে কাজ করুন এবং কোন সমস্যা হলে গৌরব ভাইকে বলুন। ধন্যবাদ।</p>
            <button class="btn-main" onclick="startApp()">কাজ শুরু করুন</button>
        </div>

        <div id="checkerUI" style="display:none;">
            <div class="box">
                <h3 id="toolTitle" style="color: var(--gold);">Select Tool From Menu</h3>
                <div id="toolBody"></div>
                <div id="results" style="margin-top: 20px;"></div>
                <div id="copyActions" style="display:none; margin-top: 15px; display: flex; gap: 5px; flex-wrap: wrap;">
                    <button class="copy-btn" onclick="copyResult('LIVE')">Copy Good</button>
                    <button class="copy-btn" onclick="copyResult('DIE')">Copy Bad</button>
                    <button class="copy-btn" onclick="copyResult('VERIFY')">Copy Verify</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scanResults = [];
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        
        function startApp() {
            document.getElementById('welcomeUI').style.display = 'none';
            document.getElementById('checkerUI').style.display = 'block';
            document.getElementById('menuBtn').style.display = 'block';
        }

        // IP Slit (Whoer Style)
        async function loadIP() {
            const res = document.getElementById('results');
            res.innerHTML = "🌀 <b>Fetching IP Details...</b>";
            const data = await fetch('https://ipapi.co/json/').then(r => r.json());
            const now = new Date();
            
            res.innerHTML = `
                <div class="box" style="border-color: var(--gold);">
                    <div class="res-line"><span>Country: ${data.country_name}</span> <button class="copy-btn" onclick="copyText('${data.country_name}')">Copy</button></div>
                    <div class="res-line"><span>Region: ${data.region}</span> <button class="copy-btn" onclick="copyText('${data.region}')">Copy</button></div>
                    <div class="res-line"><span>Timezone: ${data.timezone}</span></div>
                    <div class="res-line"><span>Connect Time: ${now.toLocaleTimeString()}</span></div>
                    <div class="res-line"><span>Device: ${navigator.userAgent.includes('iPhone') ? 'iPhone (iOS)' : 'Android'}</span></div>
                    <div class="res-line"><span>Location: ${data.city}, ${data.country}</span> <button class="copy-btn" onclick="copyText('${data.city}')">Copy</button></div>
                    <div class="res-line"><span>VPN/Proxy: ${data.org.includes('VPN') ? 'YES' : 'NO'}</span></div>
                </div>
            `;
        }

        async function runScan(type) {
            const lines = document.getElementById('inputData').value.split('\n');
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "🚀 Scanning Started...";
            scanResults = [];

            for (let line of lines) {
                if (line.trim()) {
                    const response = await fetch('/api/check', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ inputData: line.trim(), type: type })
                    });
                    const result = await response.json();
                    scanResults.push({ data: line, status: result.status });
                    
                    let color = result.status === 'LIVE' ? 'var(--green)' : 'var(--red)';
                    resDiv.innerHTML += `<div style="color:${color}">[${result.status}] ${line}</div>`;
                }
            }
            document.getElementById('copyActions').style.display = 'flex';
        }

        function copyResult(status) {
            const filtered = scanResults.filter(r => r.status === status).map(r => r.data).join('\n');
            navigator.clipboard.writeText(filtered);
            alert(status + " Copied!");
        }

        function loadTool(name) {
            const body = document.getElementById('toolBody');
            const title = document.getElementById('toolTitle');
            document.getElementById('results').innerHTML = '';
            toggleMenu();

            if (name === 'ip') {
                title.innerText = "IP SLIT";
                body.innerHTML = `<button class="btn-main" onclick="loadIP()">Check My IP Privacy</button>`;
            } else {
                title.innerText = name.toUpperCase() + " SLIT";
                body.innerHTML = `<textarea id="inputData" rows="8" placeholder="Enter List Here..."></textarea>
                <button class="btn-main" onclick="runScan('${name}')">Start Super Scan</button>`;
            }
        }

        function copyText(txt) { navigator.clipboard.writeText(txt); alert("Copied!"); }
        function logout() { localStorage.clear(); location.reload(); }

        // চেক যদি লগইন থাকে
        if(localStorage.getItem('role')) {
            document.getElementById('welcomeUI').style.display = 'block';
        }
    </script>
</body>
</html>
