        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chakar Pro - Gourab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --gold: #f1c40f; --bg: #0d1117; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .nav { background: var(--card); padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); }
        .menu-btn { font-size: 25px; cursor: pointer; color: var(--gold); }
        .sidebar { position: fixed; right: -260px; top: 0; width: 250px; height: 100%; background: #010409; transition: 0.3s; z-index: 1000; padding-top: 50px; }
        .sidebar.active { right: 0; }
        .sidebar a { display: block; padding: 15px; color: white; text-decoration: none; border-bottom: 1px solid #222; cursor: pointer; }
        .container { padding: 20px; text-align: center; }
        .box { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; background: #0d1117; color: white; border: 1px solid var(--gold); border-radius: 5px; }
        button { width: 95%; padding: 12px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .good { color: #2ecc71; border: 1px solid #2ecc71; padding: 5px; margin: 5px; display: inline-block; cursor: pointer; }
        .bad { color: #e74c3c; border: 1px solid #e74c3c; padding: 5px; margin: 5px; display: inline-block; cursor: pointer; }
        #checkerArea, #adminArea, #dashboard { display: none; }
    </style>
</head>
<body>

    <div class="nav">
        <div style="color: var(--gold); font-weight: bold;">Gourab.com</div>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
    </div>

    <div id="sideMenu" class="sidebar">
        <a onclick="showChecker('gmail')">১. Gmail Checker</a>
        <a onclick="showChecker('ip')">২. IP Checker</a>
        <a onclick="showChecker('number')">৩. Number Checker</a>
        <a onclick="showChecker('facebook')">৪. FB ID Checker</a>
        <a onclick="showAdmin()" id="adminMenu" style="display:none; color:cyan;">Admin Panel</a>
        <div style="padding: 15px; font-size: 12px; border-top: 1px solid var(--gold);">
            <b>Contact Admin:</b><br>
            <a href="https://www.facebook.com/share/18Fm3mGraj/" target="_blank">Facebook</a>
            Telegram/WhatsApp: 8801336489062
        </div>
        <a onclick="logout()" style="color: red;">Logout</a>
    </div>

    <div class="container">
        <div id="loginSection" class="box">
            <h2 style="color: var(--gold);">Login</h2>
            <input type="email" id="lEmail" placeholder="Email">
            <input type="password" id="lPass" placeholder="Password">
            <button onclick="handleLogin()">Login</button>
        </div>

        <div id="dashboard">
            <h1 style="color: var(--gold);">স্বাগতম গৌরাব!</h1>
            <p>মেনু থেকে আপনার চেকার সিলেক্ট করুন।</p>
        </div>

        <div id="checkerArea" class="box">
            <h2 id="checkerTitle" style="color: var(--gold);"></h2>
            <textarea id="checkerInput" rows="5" placeholder="এখানে ডাটা দিন..."></textarea>
            <button onclick="startCheck()">Check Now</button>
            <div id="resultArea" style="margin-top:20px;"></div>
        </div>

        <div id="adminArea" class="box">
            <h2 style="color: var(--gold);">Admin Panel</h2>
            <div id="userList"></div>
        </div>
    </div>

    <script>
        let currentChecker = '';
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

        // পেজ রিফ্রেশ করলে সেশন চেক
        window.onload = () => {
            const role = localStorage.getItem('role');
            if(role) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                if(role === 'Admin') document.getElementById('adminMenu').style.display = 'block';
            }
        };

        async function handleLogin() {
            const email = document.getElementById('lEmail').value;
            const password = document.getElementById('lPass').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('role', data.role);
                location.reload();
            } else { alert(data.message); }
        }

        function showChecker(type) {
            currentChecker = type;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('adminArea').style.display = 'none';
            document.getElementById('checkerArea').style.display = 'block';
            document.getElementById('checkerTitle').innerText = type.toUpperCase() + " Checker";
            document.getElementById('resultArea').innerHTML = '';
            toggleMenu();
        }

        function startCheck() {
            const input = document.getElementById('checkerInput').value;
            const resArea = document.getElementById('resultArea');
            resArea.innerHTML = "Checking...";

            if(currentChecker === 'ip') {
                resArea.innerHTML = `<b>Your IP Info:</b><br>IP: 103.xxx.xx<br>Country: Bangladesh 🇧🇩<br>Speed: 15Mbps<br>Quality: 100% Secure`;
            } else {
                const lines = input.split('\n');
                resArea.innerHTML = '';
                lines.forEach(line => {
                    if(line.length > 5) {
                        const isGood = Math.random() > 0.5;
                        resArea.innerHTML += `<span class="${isGood?'good':'bad'}" onclick="navigator.clipboard.writeText('${line}')">${line} [${isGood?'LIVE':'DIE'}]</span>`;
                    }
                });
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
