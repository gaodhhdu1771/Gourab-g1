            const res = document.getElementById('results');
            res.innerHTML = "🌀 Connecting to Server...";
            setTimeout(() => {

            }, 2000);
        }

        function startCheck(mode) {
            const input = document.getElementById('input').value.split('\n');
            const res = document.getElementById('results');
            res.innerHTML = "🌀 Checking...";
            liveList = []; dieList = []; verifyList = [];
            
            setTimeout(() => {
                res.innerHTML = '';
                input.forEach(line => {
                    if(line.trim()) {
                        let status = Math.random() > 0.5 ? 'live' : (Math.random() > 0.5 ? 'die' : 'verify');

                });
                document.getElementById('copyButtons').style.display = 'flex';
            }, 1000);
        }

        function copyResults(type) {
            let text = type === 'live' ? liveList.join('\n') : (type === 'die' ? dieList.join('\n') : verifyList.join('\n'));
            navigator.clipboard.writeText(text);
            alert(type.toUpperCase() + " Data Copied!");
        }

            adm.innerHTML = html + '</table>';
        }
