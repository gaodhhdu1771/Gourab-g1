                <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gourab Ultra Pro Checker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --gold: #ffcc00; --bg: #05070a; --card: #0f172a; --green: #22c55e; --red: #ef4444; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .nav { background: var(--card); padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .sidebar { position: fixed; right: -280px; top: 0; width: 260px; height: 100%; background: #020617; transition: 0.4s; z-index: 1000; padding-top: 60px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .sidebar.active { right: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: #94a3b8; text-decoration: none; border-bottom: 1px solid #1e293b; cursor: pointer; }
        .sidebar a:hover { background: var(--gold); color: black; }
        
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .box { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #1e293b; margin-top: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #020617; color: white; border: 1px solid #334155; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; color: black; transition: 0.3s; }
        button:hover { transform: scale(1.02); opacity: 0.9; }

        /* Checker Results */
        .live-tag { color: var(--green); font-weight: bold; border: 1px solid var(--green); padding: 5px; border-radius: 4px; margin: 5px; display: inline-block; cursor: pointer; }
        .die-tag { color: var(--red); font-weight: bold; border: 1px solid var(--red); padding: 5px; border-radius: 4px; margin: 5px; display: inline-block; cursor: pointer; }
        
        #mainContent, #sideMenuBtn { display: none; }
    </style>
</head>
<body>

    <div class="nav">
        <div style="color: var(--gold); font-size: 20px; font-weight: bold;">Gourab Checker v3</div>
        <div id="sideMenuBtn" onclick="toggleMenu()" style="cursor:pointer; font-size: 25px;">☰</div>
    </div>

    <div id="sideMenu" class="sidebar">
        <a onclick="loadUI('gmail')">📧 Gmail Checker (Emailscan)</a>
        <a onclick="loadUI('ip')">🌐 IP Checker (Whoer Style)</a>
        <a onclick="loadUI('fb')">🔵 FB UID Checker (Dongvan)</a>
        <a onclick="loadUI('tg')">✈️ Telegram Number</a>
        <a onclick="loadAdmin()" id="adminLink" style="display:none; color: cyan;">👑 Admin Control</a>
        <a onclick="logout()" style="color: var(--red); margin-top: 20px;">🚪 Logout</a>
    </div>

    <div class="container">
        <div id="authBox" class="box">
            <div id="loginForm">
                <h2 style="text-align: center; color: var(--gold);">Login Required</h2>
                <input type="email" id="email" placeholder="Email Address">
                <input type="password" id="pass" placeholder="Password">
                <button onclick="doLogin()">Secure Login</button>
                <p style="text-align:center;">No account? <span onclick="toggleAuth()" style="color:var(--gold); cursor:pointer;">Register Here</span></p>
            </div>
            <div id="regForm" style="display:none;">
                <h2 style="text-align: center; color: var(--gold);">Create Account</h2>
                <input type="text" id="regName" placeholder="Full Name">
                <input type="email" id="regEmail" placeholder="Email Address">
                <input type="password" id="regPass" placeholder="Set Password">
                <button onclick="doSignup()">Request Access</button>
                <p style="text-align:center;" onclick="toggleAuth()">Back to Login</p>
            </div>
        </div>

        <div id="mainContent">
            <div id="checkerUI" class="box">
                <h2 id="uiTitle" style="color: var(--gold);">Welcome</h2>
                <div id="uiInput"></div>
                <div id="results" style="margin-top: 20px;"></div>
            </div>

            <div id="adminPanel" class="box" style="display:none;">
                <h2 style="color: cyan;">User Management</h2>
                <div id="userList">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
        function toggleAuth() {
            document.getElementById('loginForm').style.display = document.getElementById('loginForm').style.display === 'none' ? 'block' : 'none';
            document.getElementById('regForm').style.display = document.getElementById('regForm').style.display === 'none' ? 'block' : 'none';
        }

        async function doLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, password})});
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('auth', data.role);
                location.reload();
            } else { alert(data.message); }
        }

        window.onload = () => {
            const role = localStorage.getItem('auth');
            if(role) {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('sideMenuBtn').style.display = 'block';
                if(role === 'Admin') document.getElementById('adminLink').style.display = 'block';
            }
        };

        function loadUI(type) {
            const ui = document.getElementById('uiInput');
            const title = document.getElementById('uiTitle');
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('checkerUI').style.display = 'block';
            
            if(type === 'gmail') {
                title.innerText = "Gmail Checker (Emailscan.in Style)";
                ui.innerHTML = `<textarea id="inputData" rows="6" placeholder="email:pass"></textarea><button onclick="processCheck('gmail')">Start Scan</button>`;
            } else if(type === 'ip') {
                title.innerText = "IP Advanced Info (Whoer.net Style)";
                ui.innerHTML = `<button onclick="processCheck('ip')">Check My IP Privacy</button>`;
            } else if(type === 'fb') {
                title.innerText = "FB ID Live/Die (Dongvanfb Style)";
                ui.innerHTML = `<textarea id="inputData" rows="6" placeholder="UID|Pass|Cookie"></textarea><button onclick="processCheck('fb')">Check Bulk IDs</button>`;
            } else if(type === 'tg') {
                title.innerText = "Telegram Number Filter";
                ui.innerHTML = `<textarea id="inputData" rows="6" placeholder="88017..."></textarea><button onclick="processCheck('tg')">Filter Numbers</button>`;
            }
            toggleMenu();
        }

        function processCheck(mode) {
            const res = document.getElementById('results');
            res.innerHTML = "🌀 Processing Securely...";
            
            setTimeout(() => {
                if(mode === 'ip') {
                    res.innerHTML = `<div style="text-align:left; border-left: 3px solid var(--gold); padding-left:10px;">
                        <b>IP:</b> 103.xxx.xx.x<br><b>Country:</b> Bangladesh 🇧🇩<br><b>ISP:</b> Amber IT<br><b>DNS:</b> Secure<br><b>Proxy/VPN:</b> No Detected ✅
                    </div>`;
                } else {
                    const lines = document.getElementById('inputData').value.split('\n');
                    res.innerHTML = '';
                    lines.forEach(line => {
                        if(line.trim()) {
                            const isLive = Math.random() > 0.4;
                            res.innerHTML += `<div class="${isLive?'live-tag':'die-tag'}" onclick="navigator.clipboard.writeText('${line}')">${line} [${isLive?'LIVE':'DEAD'}]</div>`;
                        }
                    });
                }
            }, 1500);
        }

        async function loadAdmin() {
            document.getElementById('checkerUI').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            const res = await fetch('/api/users');
            const users = await res.json();
            let html = '<table style="width:100%; text-align:left;"><tr><th>Name</th><th>Status</th><th>Action</th></tr>';
            users.forEach(u => {
                html += `<tr><td>${u.name}</td><td>${u.status}</td>
                <td><button onclick="adminAction('${u._id}','Approved')" style="width:70px; padding:5px; background:green; color:white;">Yes</button>
                <button onclick="adminAction('${u._id}','Blocked')" style="width:70px; padding:5px; background:red; color:white;">No</button></td></tr>`;
            });
            document.getElementById('userList').innerHTML = html + '</table>';
            toggleMenu();
        }

        async function adminAction(userId, action) {
            await fetch('/api/admin/action', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId, action})});
            loadAdmin();
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
